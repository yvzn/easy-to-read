variables:
- group: "production"

trigger:
  branches:
    include:
    - main
  paths:
    include:
    - api

pool:
  vmImage: ubuntu-latest

jobs:
- job: CI
  steps:
  - bash: |
      cd api
      if [ -f extensions.csproj ]
      then
          dotnet build extensions.csproj --output ./bin
      fi
      npm ci
      npm run build --if-present
      npm prune --production
  - task: ArchiveFiles@2
    displayName: "Archive files"
    inputs:
      rootFolderOrFile: "$(System.DefaultWorkingDirectory)/api"
      includeRootFolder: false
      archiveFile: "$(System.ArtifactStagingDirectory)/build$(Build.BuildId).zip"
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(System.ArtifactStagingDirectory)/build$(Build.BuildId).zip'
      publishLocation: 'pipeline'
      artifact: 'api'

- deployment: CD
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  environment: 'Azure'
  strategy:
    runOnce:
      deploy:
        steps:
        - task: ExtractFiles@1
          inputs:
            archiveFilePatterns: '$(Pipeline.Workspace)/api/*.zip'
            destinationFolder: '$(Pipeline.Workspace)/wip'
            cleanDestinationFolder: true
            overwriteExistingFiles: true
        - task: DownloadSecureFile@1
          name: userPromptTxt
          displayName: 'Download user-prompt.txt'
          inputs:
            secureFile: 'user-prompt.txt'
        - task: DownloadSecureFile@1
          name: systemPromptTxt
          displayName: 'Download system-prompt.txt'
          inputs:
            secureFile: 'system-prompt.txt'
        - task: Bash@3
          inputs:
            targetType: 'inline'
            script: |
              echo Installing $(userPromptTxt.secureFilePath) to build directory
              rm $(Pipeline.Workspace)/wip/src/resources/user-prompt.txt
              cp $(userPromptTxt.secureFilePath) $(Pipeline.Workspace)/wip/src/resources/user-prompt.txt
              echo Installing $(systemPromptTxt.secureFilePath) to build directory
              rm $(Pipeline.Workspace)/wip/src/resources/system-prompt.txt
              cp $(systemPromptTxt.secureFilePath) $(Pipeline.Workspace)/wip/src/resources/system-prompt.txt
        - task: ArchiveFiles@2
          inputs:
            rootFolderOrFile: '$(Pipeline.Workspace)/wip'
            includeRootFolder: false
            archiveType: 'zip'
            archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        - task: AzureFunctionApp@1
          inputs:
            azureSubscription: '$(azureSubscription)'
            appType: functionAppLinux
            appName: $(functionAppName)
            package: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
